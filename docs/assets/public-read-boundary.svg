<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Public read boundary for the AI usage dashboard</title>
  <desc id="desc">A security boundary diagram showing the public browser, the server-side PHP layer, and Supabase, with secrets kept only on the server side.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F6F1"/>
      <stop offset="1" stop-color="#F2F7FB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#203040" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto">
      <path d="M2 2L13 8L2 14V2Z" fill="#5D6C84"/>
    </marker>
    <style>
      .title { font: 700 42px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #182431; }
      .subtitle { font: 400 22px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #51606D; }
      .section { font: 700 24px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #182431; }
      .eyebrow { font: 700 16px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #316D63; letter-spacing: 0.12em; text-transform: uppercase; }
      .body { font: 400 20px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #526170; }
      .small { font: 600 18px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #526170; }
      .pill { font: 700 18px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="1600" height="900" rx="32" fill="url(#bg)"/>
  <text x="88" y="92" class="title">Public Read Boundary</text>
  <text x="88" y="130" class="subtitle">What the browser can read, what stays server-only, and where the service-role key lives</text>

  <rect x="88" y="192" width="418" height="560" rx="32" fill="#FFFFFF" stroke="#D7E1EA" filter="url(#shadow)"/>
  <text x="124" y="248" class="eyebrow">Public side</text>
  <text x="124" y="286" class="section">Browser</text>
  <text x="124" y="338" class="body">Files shipped to every visitor:</text>
  <text x="124" y="386" class="small">- web/index.html</text>
  <text x="124" y="420" class="small">- web/app.js</text>
  <text x="124" y="454" class="small">- web/config.js</text>
  <text x="124" y="520" class="body">Allowed to know:</text>
  <text x="124" y="568" class="small">- API endpoint path</text>
  <text x="124" y="602" class="small">- selected day range</text>
  <text x="124" y="636" class="small">- rendered dashboard JSON</text>
  <rect x="124" y="676" width="280" height="46" rx="14" fill="#316D63"/>
  <text x="146" y="706" class="pill">No Supabase secrets here</text>

  <rect x="592" y="154" width="418" height="636" rx="32" fill="#FFFFFF" stroke="#D7E1EA" filter="url(#shadow)"/>
  <text x="628" y="210" class="eyebrow">Server-only boundary</text>
  <text x="628" y="248" class="section">PHP layer</text>
  <text x="628" y="300" class="body">Entry points:</text>
  <text x="628" y="348" class="small">- web/api/dashboard_data.php</text>
  <text x="628" y="382" class="small">- web/api/views.php</text>
  <text x="628" y="440" class="body">Secret storage:</text>
  <text x="628" y="488" class="small">- web/api/config.local.php</text>
  <text x="628" y="522" class="small">- host environment variables</text>
  <text x="628" y="580" class="body">Responsibilities:</text>
  <text x="628" y="628" class="small">- validate requested day range</text>
  <text x="628" y="662" class="small">- query Supabase server-side</text>
  <text x="628" y="696" class="small">- return JSON to the browser</text>
  <rect x="628" y="726" width="284" height="46" rx="14" fill="#1E5366"/>
  <text x="652" y="756" class="pill">Service-role key stays here</text>

  <rect x="1096" y="192" width="416" height="560" rx="32" fill="#FFFFFF" stroke="#D7E1EA" filter="url(#shadow)"/>
  <text x="1132" y="248" class="eyebrow">Data store</text>
  <text x="1132" y="286" class="section">Supabase</text>
  <text x="1132" y="338" class="body">Tables read by the dashboard:</text>
  <text x="1132" y="386" class="small">- usage_dashboard_metadata</text>
  <text x="1132" y="420" class="small">- usage_sources_daily</text>
  <text x="1132" y="454" class="small">- usage_projects_daily</text>
  <text x="1132" y="488" class="small">- usage_models_daily</text>
  <text x="1132" y="522" class="small">- usage_sessions_daily</text>
  <text x="1132" y="556" class="small">- usage_tool_calls</text>
  <text x="1132" y="614" class="body">Internal split:</text>
  <text x="1132" y="662" class="small">- public summaries for dashboards</text>
  <text x="1132" y="696" class="small">- server-only raw detail for drilldowns</text>

  <path d="M506 472H592" stroke="#5D6C84" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M1010 472H1096" stroke="#5D6C84" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="690" y="94" width="214" height="40" rx="12" fill="#EAF6F3" stroke="#CFE2DE"/>
  <text x="724" y="120" class="small">Only JSON crosses to the browser</text>

  <rect x="568" y="826" width="470" height="46" rx="16" fill="#EAF6F3" stroke="#CFE2DE"/>
  <text x="600" y="856" class="small">The public repo is safe because secrets are placeholders or server-only files.</text>
</svg>
