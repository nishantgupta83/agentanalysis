<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI usage analytics end-to-end flow</title>
  <desc id="desc">A visual flow from local Codex and Claude JSONL logs through parsing, rollups, sync to Supabase, server-side PHP API reads, and the public dashboard frontend.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1480" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F6F1"/>
      <stop offset="1" stop-color="#EEF4F8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F6FAFC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#203040" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto">
      <path d="M2 2L13 8L2 14V2Z" fill="#5D6C84"/>
    </marker>
    <style>
      .title { font: 700 42px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #182431; }
      .subtitle { font: 400 22px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #51606D; }
      .section { font: 700 18px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #2D4257; letter-spacing: 0.12em; text-transform: uppercase; }
      .card-title { font: 700 24px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #182431; }
      .card-body { font: 400 19px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #526170; }
      .mini { font: 700 16px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #316D63; letter-spacing: 0.10em; text-transform: uppercase; }
      .step { font: 700 18px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #FFFFFF; }
      .footer { font: 600 20px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #316D63; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" rx="32" fill="url(#bg)"/>
  <text x="92" y="90" class="title">End-to-End Flow</text>
  <text x="92" y="128" class="subtitle">From local AI session logs to a public dashboard with server-side Supabase reads</text>

  <text x="92" y="190" class="section">Input Sources</text>
  <text x="475" y="190" class="section">Parsing + Rollups</text>
  <text x="980" y="190" class="section">Storage + Serving</text>

  <rect x="92" y="224" width="285" height="132" rx="24" fill="url(#card)" stroke="#D5DEE8" filter="url(#shadow)"/>
  <text x="126" y="274" class="mini">Step 1</text>
  <text x="126" y="312" class="card-title">Local Codex JSONL logs</text>
  <text x="126" y="342" class="card-body">Token counts, tools, paths,</text>
  <text x="126" y="368" class="card-body">session metadata</text>

  <rect x="92" y="408" width="285" height="132" rx="24" fill="url(#card)" stroke="#D5DEE8" filter="url(#shadow)"/>
  <text x="126" y="458" class="mini">Step 1</text>
  <text x="126" y="496" class="card-title">Local Claude JSONL logs</text>
  <text x="126" y="526" class="card-body">Messages, tool usage, usage</text>
  <text x="126" y="552" class="card-body">blocks, sidechain signals</text>

  <rect x="457" y="224" width="320" height="132" rx="24" fill="url(#card)" stroke="#CFE2DE" filter="url(#shadow)"/>
  <text x="491" y="274" class="mini">Step 2</text>
  <text x="491" y="312" class="card-title">dashboard/parsers.py</text>
  <text x="491" y="342" class="card-body">Normalizes usage events and</text>
  <text x="491" y="368" class="card-body">base tool-call rows</text>

  <rect x="457" y="408" width="320" height="132" rx="24" fill="url(#card)" stroke="#CFE2DE" filter="url(#shadow)"/>
  <text x="491" y="458" class="mini">Step 2</text>
  <text x="491" y="496" class="card-title">dashboard/psyco.py</text>
  <text x="491" y="526" class="card-body">Adds tool outcomes, code</text>
  <text x="491" y="552" class="card-body">lines, files touched, MCP stats</text>

  <rect x="842" y="316" width="336" height="132" rx="24" fill="url(#card)" stroke="#D8D8EA" filter="url(#shadow)"/>
  <text x="876" y="366" class="mini">Step 3</text>
  <text x="876" y="404" class="card-title">dashboard/rollups.py</text>
  <text x="876" y="434" class="card-body">Sanitizes paths, hashes projects,</text>
  <text x="876" y="460" class="card-body">builds raw + daily aggregate tables</text>

  <rect x="1244" y="316" width="264" height="132" rx="24" fill="url(#card)" stroke="#E3DCC8" filter="url(#shadow)"/>
  <text x="1278" y="366" class="mini">Step 4</text>
  <text x="1278" y="404" class="card-title">sync script</text>
  <text x="1278" y="434" class="card-body">Dry run, incremental sync,</text>
  <text x="1278" y="460" class="card-body">or full refresh</text>

  <rect x="92" y="636" width="876" height="244" rx="30" fill="#FFFFFF" stroke="#D7E1EA" filter="url(#shadow)"/>
  <text x="128" y="696" class="mini">Step 5</text>
  <text x="128" y="736" class="card-title">Supabase usage_* tables</text>
  <text x="128" y="772" class="card-body">The sync writes both detailed raw rows and fast dashboard rollups.</text>

  <rect x="128" y="792" width="360" height="54" rx="16" fill="#EAF6F3"/>
  <text x="154" y="826" class="card-body">Raw: usage_events, usage_tool_calls</text>

  <rect x="518" y="792" width="414" height="54" rx="16" fill="#EEF3FB"/>
  <text x="544" y="826" class="card-body">Aggregates: sessions, projects, models, sources, metadata</text>

  <rect x="1040" y="636" width="242" height="244" rx="30" fill="#FFFFFF" stroke="#D7E1EA" filter="url(#shadow)"/>
  <text x="1072" y="696" class="mini">Step 6</text>
  <text x="1072" y="736" class="card-title">PHP API proxy</text>
  <text x="1072" y="772" class="card-body">web/api/</text>
  <text x="1072" y="800" class="card-body">dashboard_data.php</text>
  <text x="1072" y="834" class="card-body">Reads Supabase server-side</text>
  <text x="1072" y="862" class="card-body">for days=7, 30, or 90</text>

  <rect x="1328" y="636" width="180" height="244" rx="30" fill="#FFFFFF" stroke="#D7E1EA" filter="url(#shadow)"/>
  <text x="1360" y="696" class="mini">Step 7</text>
  <text x="1360" y="736" class="card-title">Frontend</text>
  <text x="1360" y="772" class="card-body">web/app.js</text>
  <text x="1360" y="800" class="card-body">web/index.html</text>
  <text x="1360" y="834" class="card-body">Interactive public</text>
  <text x="1360" y="862" class="card-body">dashboard UI</text>

  <circle cx="404" cy="290" r="18" fill="#5D6C84"/><text x="398" y="296" class="step">1</text>
  <circle cx="404" cy="474" r="18" fill="#5D6C84"/><text x="398" y="480" class="step">2</text>
  <circle cx="810" cy="382" r="18" fill="#5D6C84"/><text x="804" y="388" class="step">3</text>
  <circle cx="1210" cy="382" r="18" fill="#5D6C84"/><text x="1204" y="388" class="step">4</text>
  <circle cx="1004" cy="758" r="18" fill="#5D6C84"/><text x="998" y="764" class="step">5</text>
  <circle cx="1300" cy="758" r="18" fill="#5D6C84"/><text x="1294" y="764" class="step">6</text>

  <path d="M377 290H457" stroke="#5D6C84" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M377 474H457" stroke="#5D6C84" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M777 290C828 290 798 352 842 352" stroke="#5D6C84" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M777 474C828 474 798 412 842 412" stroke="#5D6C84" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1178 382H1244" stroke="#5D6C84" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1376 448V562C1376 596 1016 596 1016 636" stroke="#5D6C84" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M968 758H1040" stroke="#5D6C84" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1282 758H1328" stroke="#5D6C84" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="1030" y="108" width="478" height="70" rx="18" fill="#EAF6F3" stroke="#CFE2DE"/>
  <text x="1062" y="151" class="footer">Browser never receives the Supabase service-role key.</text>
</svg>
